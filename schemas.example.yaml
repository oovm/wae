# schemas.yaml - 数据库 schema 配置文件
# 此文件应添加到 .gitignore 中，因为它包含数据库连接信息

# 默认数据库（可选，不指定则使用第一个数据库）
default_database: main

# 数据库列表（支持配置多个数据库）
databases:
  # 主数据库
  - name: main
    type: Turso
    url: "file:./data.db"
    # 或者使用环境变量
    # env: MAIN_DATABASE_URL
    schemas:
      - name: users
        columns:
          - name: id
            col_type: Integer
            nullable: false
            primary_key: true
            auto_increment: true
            unique: true
          - name: name
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: email
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: true
          - name: created_at
            col_type: Text
            nullable: true
            primary_key: false
            auto_increment: false
            unique: false
        indexes:
          - name: idx_users_email
            table_name: users
            columns:
              - email
            unique: true

      - name: posts
        columns:
          - name: id
            col_type: Integer
            nullable: false
            primary_key: true
            auto_increment: true
            unique: true
          - name: user_id
            col_type: Integer
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: title
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: content
            col_type: Text
            nullable: true
            primary_key: false
            auto_increment: false
            unique: false
        indexes:
          - name: idx_posts_user_id
            table_name: posts
            columns:
              - user_id
            unique: false

  # 日志数据库（第二个数据库示例）
  - name: logs
    type: Postgres
    url: "postgres://user:pass@localhost:5432/logs"
    # 或者使用环境变量
    # env: LOGS_DATABASE_URL
    schemas:
      - name: access_logs
        columns:
          - name: id
            col_type: Integer
            nullable: false
            primary_key: true
            auto_increment: true
            unique: true
          - name: path
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: method
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: status_code
            col_type: Integer
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
          - name: timestamp
            col_type: Text
            nullable: false
            primary_key: false
            auto_increment: false
            unique: false
        indexes:
          - name: idx_access_logs_timestamp
            table_name: access_logs
            columns:
              - timestamp
            unique: false
